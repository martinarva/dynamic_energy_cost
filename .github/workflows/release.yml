# This workflow validates the manifest version and uploads the release zip.

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_release_package:
    name: Build release package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v5

      - name: Validate manifest version against release tag
        if: github.event_name == 'release'
        run: |
          python scripts/check_release_version.py \
            custom_components/dynamic_energy_cost/manifest.json \
            "${{ github.event.release.tag_name }}"

      - name: 📦 Created zipped release package
        shell: "bash"
        run: |
          cd "${{ github.workspace }}/custom_components/dynamic_energy_cost"
          zip dynamic_energy_cost.zip -r ./

      - name: ⬆️ Upload zip to release
        uses: softprops/action-gh-release@v2.4.1
        with:
          files: ${{ github.workspace }}/custom_components/dynamic_energy_cost/dynamic_energy_cost.zip
        
